name: Telegram Downloader

on:
  workflow_dispatch:
    inputs:
      links:
        description: "Paste Telegram links (one per line)"
        required: true

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Download files
        run: |
          mkdir downloads

          echo "${{ github.event.inputs.links }}" > links.txt

          while read url
          do
            yt-dlp -P downloads "$url"
          done < links.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-files
          path: downloads
