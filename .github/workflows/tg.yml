name: Smart Telegram Downloader

on:
  workflow_dispatch:
    inputs:
      links:
        description: "Paste Telegram links (space or newline separated)"
        required: true

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Prepare
        run: |
          mkdir out
          echo "${{ github.event.inputs.links }}" | tr ' ' '\n' > links.txt

      - name: Download safely (skip failures)
        run: |
          success=0
          failed=0

          while read url
          do
            if [ -z "$url" ]; then
              continue
            fi

            echo "Trying: $url"

            if yt-dlp \
              -f "best" \
              --no-part \
              --no-warnings \
              -o "out/%(title)s.%(ext)s" \
              "$url"
            then
              echo "OK: $url"
              success=$((success+1))
            else
              echo "FAILED (skipped): $url"
              failed=$((failed+1))
            fi

          done < links.txt

          echo "Done. Success=$success Failed=$failed"

      - name: Create ZIP (only if files exist)
        run: |
          if [ "$(ls -A out 2>/dev/null)" ]; then
            zip -r result.zip out
          else
            echo "No files downloaded"
            touch result.zip
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-download
          path: result.zip
