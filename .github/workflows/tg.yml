name: Multi Telegram Downloader

on:
  workflow_dispatch:
    inputs:
      links:
        description: "Paste links separated by space or new line"
        required: true

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Prepare input + download
        run: |
          mkdir out

          # تبدیل اسپیس و خط جدید به خط جدا
          echo "${{ github.event.inputs.links }}" | tr ' ' '\n' > links.txt

          while read url
          do
            if [ -n "$url" ]; then
              yt-dlp -f "best" -o "out/%(title)s.%(ext)s" "$url"
            fi
          done < links.txt

      - name: Zip files
        run: zip -r files.zip out

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: telegram-files
          path: files.zip
